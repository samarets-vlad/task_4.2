apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: todo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: python:3.9-alpine
        command: ["/bin/sh"]
        args:
        - -c
        - |
          echo 'from http.server import BaseHTTPRequestHandler, HTTPServer
          import json

          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  self.send_response(200)
                  self.send_header("Content-type", "application/json")
                  self.end_headers()
                  response = {"status": "ok", "message": "Backend API is running", "database": "mysql connected"}
                  self.wfile.write(json.dumps(response).encode())

          server = HTTPServer(("0.0.0.0", 5000), Handler)
          print("Backend API running on port 5000")
          server.serve_forever()' > /tmp/server.py
          python /tmp/server.py
        ports:
        - containerPort: 5000
        env:
        - name: MYSQL_HOST
          value: "mysql"
        - name: MYSQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: mysql-database
