auth:
  rootPassword: rootpassword
  database: tododb
  username: todouser
  password: todopassword

primary:
  persistence:
    enabled: true
    size: 5Gi
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

networkPolicy:
  enabled: true
  allowExternal: false
  ingressRules:
    accessOnlyFrom:
      enabled: true
      podSelector:
        matchLabels:
          app: backend
