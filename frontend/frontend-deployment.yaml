apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: todo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
      initContainers:
      - name: install
        image: busybox
        command:
        - sh
        - -c
        - |
          cat > /html/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Todo App - Kubernetes</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body {
                      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      min-height: 100vh;
                      padding: 20px;
                  }
                  .container {
                      max-width: 600px;
                      margin: 50px auto;
                      background: white;
                      border-radius: 15px;
                      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                      overflow: hidden;
                  }
                  .header {
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      color: white;
                      padding: 30px;
                      text-align: center;
                  }
                  .header h1 { font-size: 2em; margin-bottom: 10px; }
                  .info { background: #f8f9fa; padding: 15px; border-bottom: 2px solid #e9ecef; }
                  .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; font-size: 0.85em; }
                  .info-item { padding: 8px; background: white; border-radius: 5px; }
                  .info-label { font-weight: bold; color: #667eea; }
                  .input-section {
                      padding: 20px;
                      display: flex;
                      gap: 10px;
                  }
                  #todoInput {
                      flex: 1;
                      padding: 15px;
                      border: 2px solid #e9ecef;
                      border-radius: 8px;
                      font-size: 1em;
                  }
                  #todoInput:focus {
                      outline: none;
                      border-color: #667eea;
                  }
                  #addBtn {
                      padding: 15px 30px;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      color: white;
                      border: none;
                      border-radius: 8px;
                      cursor: pointer;
                      font-size: 1em;
                      font-weight: bold;
                      transition: transform 0.2s;
                  }
                  #addBtn:hover { transform: translateY(-2px); }
                  #addBtn:active { transform: translateY(0); }
                  .todo-list { padding: 20px; }
                  .todo-item {
                      display: flex;
                      align-items: center;
                      padding: 15px;
                      margin-bottom: 10px;
                      background: #f8f9fa;
                      border-radius: 8px;
                      transition: all 0.3s;
                  }
                  .todo-item:hover { background: #e9ecef; transform: translateX(5px); }
                  .todo-item.completed { opacity: 0.6; }
                  .todo-item.completed .todo-text { text-decoration: line-through; }
                  .todo-checkbox {
                      width: 20px;
                      height: 20px;
                      margin-right: 15px;
                      cursor: pointer;
                  }
                  .todo-text { flex: 1; font-size: 1em; }
                  .delete-btn {
                      padding: 8px 15px;
                      background: #dc3545;
                      color: white;
                      border: none;
                      border-radius: 5px;
                      cursor: pointer;
                      font-size: 0.9em;
                  }
                  .delete-btn:hover { background: #c82333; }
                  .empty-state {
                      text-align: center;
                      padding: 40px;
                      color: #6c757d;
                  }
                  .stats {
                      padding: 15px 20px;
                      background: #f8f9fa;
                      border-top: 2px solid #e9ecef;
                      display: flex;
                      justify-content: space-between;
                      font-size: 0.9em;
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="header">
                      <h1>Todo Application</h1>
                      <p>Kubernetes Deployment</p>
                  </div>
                  
                  <div class="info">
                      <div class="info-grid">
                          <div class="info-item"><span class="info-label">Frontend:</span> Nginx</div>
                          <div class="info-item"><span class="info-label">Backend:</span> Python API</div>
                          <div class="info-item"><span class="info-label">Database:</span> MySQL 8.0</div>
                          <div class="info-item"><span class="info-label">Ingress:</span> Nginx Controller</div>
                      </div>
                  </div>

                  <div class="input-section">
                      <input type="text" id="todoInput" placeholder="Add a new task..." />
                      <button id="addBtn">Add Task</button>
                  </div>

                  <div class="todo-list" id="todoList"></div>

                  <div class="stats">
                      <span id="totalTasks">Total: 0</span>
                      <span id="completedTasks">Completed: 0</span>
                  </div>
              </div>

              <script>
                  let todos = JSON.parse(localStorage.getItem('todos')) || [];

                  function saveTodos() {
                      localStorage.setItem('todos', JSON.stringify(todos));
                  }

                  function renderTodos() {
                      const todoList = document.getElementById('todoList');
                      
                      if (todos.length === 0) {
                          todoList.innerHTML = '<div class="empty-state">No tasks yet. Add one above!</div>';
                      } else {
                          todoList.innerHTML = todos.map((todo, index) => `
                              <div class="todo-item ${todo.completed ? 'completed' : ''}">
                                  <input type="checkbox" class="todo-checkbox" 
                                         ${todo.completed ? 'checked' : ''} 
                                         onchange="toggleTodo(${index})">
                                  <span class="todo-text">${todo.text}</span>
                                  <button class="delete-btn" onclick="deleteTodo(${index})">Delete</button>
                              </div>
                          `).join('');
                      }

                      updateStats();
                  }

                  function updateStats() {
                      const total = todos.length;
                      const completed = todos.filter(t => t.completed).length;
                      document.getElementById('totalTasks').textContent = `Total: ${total}`;
                      document.getElementById('completedTasks').textContent = `Completed: ${completed}`;
                  }

                  function addTodo() {
                      const input = document.getElementById('todoInput');
                      const text = input.value.trim();
                      
                      if (text) {
                          todos.push({ text, completed: false });
                          input.value = '';
                          saveTodos();
                          renderTodos();
                      }
                  }

                  function toggleTodo(index) {
                      todos[index].completed = !todos[index].completed;
                      saveTodos();
                      renderTodos();
                  }

                  function deleteTodo(index) {
                      todos.splice(index, 1);
                      saveTodos();
                      renderTodos();
                  }

                  document.getElementById('addBtn').addEventListener('click', addTodo);
                  document.getElementById('todoInput').addEventListener('keypress', (e) => {
                      if (e.key === 'Enter') addTodo();
                  });

                  renderTodos();
              </script>
          </body>
          </html>
          HTMLEOF
        volumeMounts:
        - name: html
          mountPath: /html
      volumes:
      - name: html
        emptyDir: {}
