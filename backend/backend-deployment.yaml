apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: todo-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: python:3.9.21-alpine
        command: ["/bin/sh"]
        args:
        - -c
        - |
          python -c 'from http.server import BaseHTTPRequestHandler, HTTPServer; import json
          class H(BaseHTTPRequestHandler):
              def do_GET(self):
                  self.send_response(200); self.send_header("Content-type", "application/json"); self.end_headers()
                  self.wfile.write(json.dumps({"status": "ok", "message": "Backend API", "database": "mysql"}).encode())
          HTTPServer(("0.0.0.0", 5000), H).serve_forever()'
        ports:
        - containerPort: 5000
        envFrom:
        - secretRef:
            name: mysql-secret
